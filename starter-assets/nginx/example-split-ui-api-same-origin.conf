# Action Desk — host nginx: TLS termination + reverse proxy to Docker Compose loopback ports.
#
# Topology (see docs/runbooks/deploy_actiondesk.md):
#   https://actiondesk.bratek.io/      → 127.0.0.1:3002 (actiondesk-frontend)
#   https://actiondesk.bratek.io/_next/ → 127.0.0.1:3002
#   https://actiondesk.bratek.io/api/  → 127.0.0.1:8002 (actiondesk-backend)
#
# Install (Debian/Ubuntu-style):
#   sudo cp infra/nginx/actiondesk.conf /etc/nginx/sites-available/actiondesk.conf
#   sudo ln -sf /etc/nginx/sites-available/actiondesk.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS: obtain certificates with certbot (or your CA), then ensure paths below match.
# Offline syntax check (proxy layout aligned): infra/nginx/actiondesk.docker-syntax.conf
#   + docs/acceptance/deployment_verification.md (docker run … nginx -t).

upstream actiondesk_frontend {
    server 127.0.0.1:3002;
    keepalive 32;
}

upstream actiondesk_backend {
    server 127.0.0.1:8002;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name actiondesk.bratek.io;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name actiondesk.bratek.io;

    # Let's Encrypt — default certbot layout. Replace if using another issuer/path.
    ssl_certificate     /etc/letsencrypt/live/actiondesk.bratek.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/actiondesk.bratek.io/privkey.pem;

    # Optional hardening snippets (create empty files or install certbot's recommended config):
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10m;

    location /api/ {
        proxy_pass http://actiondesk_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location /_next/ {
        proxy_pass http://actiondesk_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location / {
        proxy_pass http://actiondesk_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
