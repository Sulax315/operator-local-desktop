# mcp.bratek.io — TLS termination, MCP path routing, bearer auth (auth_request).
# Extend with new `location ^~ /svc/` blocks mirroring /sample/.

upstream mcp_auth_sidecar {
    server auth_sidecar:8089;
    keepalive 8;
}

upstream mcp_sample {
    server sample_mcp:8080;
    keepalive 16;
}

upstream mcp_schedulelab {
    server schedulelab_mcp:8080;
    keepalive 16;
}

upstream mcp_controltower {
    server controltower_mcp:8080;
    keepalive 16;
}

upstream mcp_schedule_analysis {
    server schedule_analysis_mcp:8080;
    keepalive 16;
}

upstream mcp_controltower_orchestrator {
    server controltower_orchestrator_mcp:8080;
    keepalive 16;
}

upstream mcp_control_panel {
    server mcp_control_panel:8000;
    keepalive 8;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name mcp.bratek.io;

    # ACME HTTP-01 (optional); TLS primary on 443
    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mcp.bratek.io;

    ssl_certificate     /etc/nginx/tls/fullchain.pem;
    ssl_certificate_key /etc/nginx/tls/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Sub-request bearer validation (shared by MCP routes).
    location = /_mcp_bearer_auth {
        internal;
        proxy_pass http://mcp_auth_sidecar/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Authorization $http_authorization;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ---- Public health (no bearer required) ----
    location = /health {
        default_type application/json;
        add_header Cache-Control "no-store";
        return 200 '{"status":"healthy","gateway":"mcp_gateway"}';
    }

    location = /panel {
        return 301 https://$host/panel/;
    }

    # ---- Browser MCP operator panel (session auth in app; MCP bearer never sent to browser) ----
    location ^~ /panel/ {
        limit_req zone=mcp_per_ip burst=40 nodelay;
        proxy_pass http://mcp_control_panel/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ---- Sample MCP: health without auth ----
    location = /sample/health {
        limit_req zone=mcp_per_ip burst=80 nodelay;
        proxy_pass http://mcp_sample/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Bratek-Mcp-Route sample;
    }

    # ---- Sample MCP: streamable HTTP + tools (auth required) ----
    location /sample/ {
        limit_req zone=mcp_per_ip burst=80 nodelay;
        auth_request /_mcp_bearer_auth;
        auth_request_set $auth_status $upstream_status;
        error_page 401 403 = @mcp_authz_failed;

        rewrite ^/sample/(.*)$ /$1 break;
        proxy_pass http://mcp_sample;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Bratek-Mcp-Route sample;
        proxy_set_header Connection "";

        # Starlette redirect_slashes builds Location from the stripped path (/mcp/) — restore public prefix.
        proxy_redirect http://$host/mcp/  https://$host/sample/mcp/;
        proxy_redirect https://$host/mcp/ https://$host/sample/mcp/;
        proxy_redirect http://$host/mcp   https://$host/sample/mcp;
        proxy_redirect https://$host/mcp  https://$host/sample/mcp;
        proxy_redirect /mcp/ /sample/mcp/;
        proxy_redirect /mcp  /sample/mcp;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # ---- Future services (auth required; not deployed yet) ----
    # Named returns only (no inline return): inline return skips auth_request.
    location ^~ /github/ {
        limit_req zone=mcp_per_ip burst=40 nodelay;
        auth_request /_mcp_bearer_auth;
        error_page 401 403 = @mcp_authz_failed;
        try_files /__mcp_deadend__ @github_not_deployed;
    }
    location = /schedulelab/health {
        limit_req zone=mcp_per_ip burst=80 nodelay;
        proxy_pass http://mcp_schedulelab/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Bratek-Mcp-Route schedulelab;
    }

    location /schedulelab/ {
        limit_req zone=mcp_per_ip burst=80 nodelay;
        auth_request /_mcp_bearer_auth;
        auth_request_set $auth_status $upstream_status;
        error_page 401 403 = @mcp_authz_failed;

        rewrite ^/schedulelab/(.*)$ /$1 break;
        proxy_pass http://mcp_schedulelab;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Bratek-Mcp-Route schedulelab;
        proxy_set_header Connection "";

        proxy_redirect http://$host/mcp/  https://$host/schedulelab/mcp/;
        proxy_redirect https://$host/mcp/ https://$host/schedulelab/mcp/;
        proxy_redirect http://$host/mcp   https://$host/schedulelab/mcp;
        proxy_redirect https://$host/mcp  https://$host/schedulelab/mcp;
        proxy_redirect /mcp/ /schedulelab/mcp/;
        proxy_redirect /mcp  /schedulelab/mcp;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    location = /controltower/health {
        limit_req zone=mcp_per_ip burst=80 nodelay;
        proxy_pass http://mcp_controltower/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
