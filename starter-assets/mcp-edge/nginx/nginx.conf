# Bratek MCP gateway — edge nginx (TLS, routing, rate limits, auth_request bearer).

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  2048;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format mcp_main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for" '
                        'rt=$request_time urt=$upstream_response_time '
                        'upstream=$upstream_addr auth=$upstream_status';

    access_log  /var/log/nginx/access.log mcp_main;

    sendfile        on;
    keepalive_timeout  65;

    limit_req_zone $binary_remote_addr zone=mcp_per_ip:10m rate=30r/s;
    limit_req_log_level warn;

    include /etc/nginx/conf.d/*.conf;
}
