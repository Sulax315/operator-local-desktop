# Bratek Operator Stack — Phase 1 (local operator plane)
# Metabase + n8n + Postgres. Loopback-only UI ports; Postgres is internal-only (no host publish).
#
# Copy `.env.example` → `.env`, edit secrets, then: `docker compose up -d`

name: bratek-operator-phase1

services:
  postgres:
    image: postgres:16-alpine
    container_name: bratek-phase1-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${TZ:-UTC}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - phase1-internal

  metabase:
    image: metabase/metabase:latest
    container_name: bratek-phase1-metabase
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${TZ:-UTC}
    ports:
      - "127.0.0.1:8082:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - phase1-internal

  n8n:
    image: n8nio/n8n:latest
    container_name: bratek-phase1-n8n
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${TZ:-UTC}
    ports:
      - "127.0.0.1:8083:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - phase1-internal

volumes:
  postgres_data:
    name: bratek-phase1-postgres-data
  n8n_data:
    name: bratek-phase1-n8n-data

networks:
  phase1-internal:
    name: bratek-phase1-internal
    driver: bridge
