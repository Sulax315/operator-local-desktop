name: Windows Tauri Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "backend/**"
      - "frontend/**"
      - "src-tauri/**"
      - "web/operator_local_ui/**"
      - "scripts/**"
      - "build_control/operator_local/09_WORKFLOW_REGISTRY.json"
      - ".github/workflows/windows-tauri-build.yml"

jobs:
  build-windows-installer:
    name: Build Windows NSIS installer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Diagnose checkout layout
        shell: pwsh
        run: |
          Write-Host "Repository root:"
          Get-Location
          Write-Host "Tree depth 2:"
          Get-ChildItem -Force -Depth 2 | Select-Object FullName, Length, LastWriteTime

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Diagnose frontend build output
        shell: pwsh
        run: |
          Write-Host "frontend/dist contents:"
          if (Test-Path frontend/dist) {
            Get-ChildItem frontend/dist -Recurse | Select-Object FullName, Length, LastWriteTime
          } else {
            Write-Error "frontend/dist is missing"
          }

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
          python -m pip install pyinstaller

      - name: Diagnose before PyInstaller
        shell: pwsh
        run: |
          Write-Host "Backend and packaging inputs:"
          Get-ChildItem backend -Recurse | Select-Object FullName, Length, LastWriteTime
          Get-ChildItem web/operator_local_ui -Depth 2 | Select-Object FullName, Length, LastWriteTime
          Get-ChildItem src-tauri -Depth 2 | Select-Object FullName, Length, LastWriteTime

      - name: Build backend sidecar
        run: |
          pyinstaller --clean --noconfirm --onefile --name backend_app `
            --paths . `
            --paths scripts `
            --hidden-import web.operator_local_ui.app `
            --hidden-import operator_envelope `
            --hidden-import init_operator_run `
            --hidden-import run_workflow `
            --hidden-import validate_operator_run `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.protocols.websockets.auto `
            --hidden-import uvicorn.lifespan.on `
            --collect-submodules operator_workflows `
            --collect-data openpyxl `
            --collect-data jinja2 `
            --add-data "web/operator_local_ui/templates;web/operator_local_ui/templates" `
            --add-data "web/operator_local_ui/static;web/operator_local_ui/static" `
            --add-data "scripts;scripts" `
            --add-data "build_control/operator_local/09_WORKFLOW_REGISTRY.json;build_control/operator_local" `
            backend/app/main.py

      - name: Diagnose PyInstaller output
        shell: pwsh
        run: |
          Write-Host "PyInstaller dist contents:"
          if (Test-Path dist) {
            Get-ChildItem dist -Recurse | Select-Object FullName, Length, LastWriteTime
          } else {
            Write-Error "dist is missing"
          }
          Write-Host "PyInstaller build contents:"
          if (Test-Path build) {
            Get-ChildItem build -Depth 3 | Select-Object FullName, Length, LastWriteTime
          }

      - name: Move backend sidecar for Tauri
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/binaries
          Move-Item -Force dist/backend_app.exe src-tauri/binaries/backend_app-x86_64-pc-windows-msvc.exe

      - name: Diagnose sidecar placement
        shell: pwsh
        run: |
          Write-Host "src-tauri/binaries contents:"
          Get-ChildItem src-tauri/binaries -Force | Select-Object FullName, Length, LastWriteTime

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Diagnose Tauri config path
        shell: bash
        run: |
          pwd
          ls -la
          ls -la src-tauri
          test -f src-tauri/tauri.conf.json

      - name: Build Tauri app
        run: |
          cd frontend
          npm ci
          npm run build
          cd ..
          npx tauri build --bundles nsis

      - name: Diagnose Tauri bundle output
        if: always()
        shell: pwsh
        run: |
          Write-Host "src-tauri/target/release/bundle contents:"
          if (Test-Path src-tauri/target/release/bundle) {
            Get-ChildItem src-tauri/target/release/bundle -Recurse | Select-Object FullName, Length, LastWriteTime
          } else {
            Write-Host "src-tauri/target/release/bundle does not exist"
          }

      - name: Upload NSIS installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: operator-local-windows-nsis
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.nsis.zip
          if-no-files-found: error
